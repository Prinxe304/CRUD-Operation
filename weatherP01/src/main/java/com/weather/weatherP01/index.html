<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Forecast Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-cloud-sun"></i> Weather Forecast Dashboard</h1>
            <p>Get real-time weather data for any city</p>
        </header>
        
        <div class="search-section">
            <div class="search-card">
                <h2><i class="fas fa-search-location"></i> Search Weather</h2>
                <form id="weatherForm">
                    <div class="form-group">
                        <label for="city"><i class="fas fa-city"></i> City Name</label>
                        <input type="text" id="city" placeholder="Enter city name (e.g., Pune, London, Tokyo)" value="Pune" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="days"><i class="fas fa-calendar-day"></i> Forecast Days</label>
                        <select id="days">
                            <option value="1">1 Day</option>
                            <option value="3" selected>3 Days</option>
                            <option value="5">5 Days</option>
                            <option value="7">7 Days</option>
                        </select>
                    </div>
                    
                    <button type="submit" id="searchBtn">
                        <i class="fas fa-cloud-sun-rain"></i> Get Weather Forecast
                    </button>
                    
                    <div class="popular-cities">
                        <p>Quick search:</p>
                        <div class="city-tags">
                            <span class="city-tag" data-city="Pune">Pune</span>
                            <span class="city-tag" data-city="Mumbai">Mumbai</span>
                            <span class="city-tag" data-city="Delhi">Delhi</span>
                            <span class="city-tag" data-city="Bangalore">Bangalore</span>
                            <span class="city-tag" data-city="London">London</span>
                            <span class="city-tag" data-city="New York">New York</span>
                            <span class="city-tag" data-city="Tokyo">Tokyo</span>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
        <div class="weather-app" id="weatherApp" style="display: none;">
            <div class="current-weather" id="currentWeather">
                <!-- Current weather data will be loaded here -->
            </div>
            
            <div class="forecast-section">
                <h2 class="section-title">
                    <i class="fas fa-calendar-alt"></i> 
                    <span id="forecastTitle">3-Day Forecast for Pune</span>
                </h2>
                <div class="forecast-days" id="forecastDays">
                    <!-- Forecast data will be loaded here -->
                </div>
            </div>
            
            <div class="actions">
                <button id="backToSearch" class="action-btn">
                    <i class="fas fa-search"></i> Search Again
                </button>
                <button id="refreshData" class="action-btn">
                    <i class="fas fa-sync-alt"></i> Refresh Data
                </button>
            </div>
        </div>
        
        <footer>
            <p>Weather Forecast Dashboard &copy; 2023 | Data provided by Weather API</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
